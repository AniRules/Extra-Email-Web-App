name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Pake
        run: npm install -g pake-cli

      - name: Install WebView2
        run: |
          Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/p/?LinkId=2124703' -OutFile 'webview2.exe'
          Start-Process -FilePath 'webview2.exe' -Args '/silent /install' -Wait
        shell: powershell

      - name: Build
        run: pake https://extra.email --name Extra --inject linux/inject-fix.js

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Extra-Windows
          path: "*.msi"
